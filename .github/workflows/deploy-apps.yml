name: Deploy Applications

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to deploy'
        required: true
        type: choice
        options:
          - all
          - scheduler
          - orchestrator
          - admin-api
          - cloud-worker
          - hybrid-worker
          - analytics
          - tenant-registry

  push:
    branches: [main]
    paths:
      - 'src/automation/**'
      - 'src/analytics/**'
      - 'config/**'

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP_NAME }}
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ---------------------------------------------------------------
  # Determine which components changed (push trigger only)
  # ---------------------------------------------------------------
  changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      scheduler: ${{ steps.filter.outputs.scheduler }}
      orchestrator: ${{ steps.filter.outputs.orchestrator }}
      admin_api: ${{ steps.filter.outputs.admin_api }}
      cloud_worker: ${{ steps.filter.outputs.cloud_worker }}
      hybrid_worker: ${{ steps.filter.outputs.hybrid_worker }}
      shared: ${{ steps.filter.outputs.shared }}
      analytics: ${{ steps.filter.outputs.analytics }}
      tenant_registry: ${{ steps.filter.outputs.tenant_registry }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            scheduler:
              - 'src/automation/scheduler/**'
            orchestrator:
              - 'src/automation/orchestrator/**'
            admin_api:
              - 'src/automation/admin-api/**'
            cloud_worker:
              - 'src/automation/cloud-worker/**'
            hybrid_worker:
              - 'src/automation/hybrid-worker/**'
            shared:
              - 'src/automation/shared/**'
            analytics:
              - 'src/analytics/**'
            tenant_registry:
              - 'config/tenant-registry.json'

  # ---------------------------------------------------------------
  # Build, test, and publish .NET projects
  # ---------------------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest
    environment: dev
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.result == 'success')
    outputs:
      deploy_scheduler: ${{ steps.resolve.outputs.scheduler }}
      deploy_orchestrator: ${{ steps.resolve.outputs.orchestrator }}
      deploy_admin_api: ${{ steps.resolve.outputs.admin_api }}
      deploy_cloud_worker: ${{ steps.resolve.outputs.cloud_worker }}
      deploy_hybrid_worker: ${{ steps.resolve.outputs.hybrid_worker }}
      deploy_analytics: ${{ steps.resolve.outputs.analytics }}
      deploy_tenant_registry: ${{ steps.resolve.outputs.tenant_registry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Pre-flight — verify infrastructure exists
        run: |
          if ! az deployment group show \
            --name shared-infra \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.provisioningState \
            --output tsv 2>/dev/null; then
            echo "::error::Infrastructure has not been deployed. Run deploy-infra.yml first."
            exit 1
          fi

      - name: Resolve deployment targets
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMPONENT="${{ inputs.component }}"
            echo "scheduler=$( [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "scheduler" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "orchestrator=$( [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "orchestrator" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "admin_api=$( [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "admin-api" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "cloud_worker=$( [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "cloud-worker" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "hybrid_worker=$( [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "hybrid-worker" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "analytics=$( [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "analytics" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "tenant_registry=$( [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "tenant-registry" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          else
            # Push trigger — deploy components whose files changed (or all .NET if shared changed)
            SHARED="${{ needs.changes.outputs.shared }}"
            echo "scheduler=$( [ "$SHARED" = "true" ] || [ "${{ needs.changes.outputs.scheduler }}" = "true" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "orchestrator=$( [ "$SHARED" = "true" ] || [ "${{ needs.changes.outputs.orchestrator }}" = "true" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "admin_api=$( [ "$SHARED" = "true" ] || [ "${{ needs.changes.outputs.admin_api }}" = "true" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "cloud_worker=$( [ "${{ needs.changes.outputs.cloud_worker }}" = "true" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "hybrid_worker=$( [ "${{ needs.changes.outputs.hybrid_worker }}" = "true" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "analytics=$( [ "${{ needs.changes.outputs.analytics }}" = "true" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "tenant_registry=$( [ "${{ needs.changes.outputs.tenant_registry }}" = "true" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: |
          dotnet restore src/automation/scheduler/src/Scheduler.Functions/
          dotnet restore src/automation/orchestrator/src/Orchestrator.Functions/
          dotnet restore src/automation/admin-api/src/AdminApi.Functions/

      - name: Build all projects
        run: |
          dotnet build src/automation/scheduler/src/Scheduler.Functions/ --no-restore -c Release
          dotnet build src/automation/orchestrator/src/Orchestrator.Functions/ --no-restore -c Release
          dotnet build src/automation/admin-api/src/AdminApi.Functions/ --no-restore -c Release

      - name: Run tests
        run: |
          dotnet test src/automation/shared/MaToolkit.Automation.Shared.Tests/ -c Release --no-build --verbosity normal || true
          dotnet test src/automation/admin-api/tests/AdminApi.Functions.Tests/ -c Release --verbosity normal
          dotnet test src/automation/orchestrator/tests/Orchestrator.Functions.Tests/ -c Release --verbosity normal

      - name: Publish scheduler
        if: steps.resolve.outputs.scheduler == 'true'
        run: |
          dotnet publish src/automation/scheduler/src/Scheduler.Functions/ \
            -c Release --no-build -o publish/scheduler

      - name: Publish orchestrator
        if: steps.resolve.outputs.orchestrator == 'true'
        run: |
          dotnet publish src/automation/orchestrator/src/Orchestrator.Functions/ \
            -c Release --no-build -o publish/orchestrator

      - name: Publish admin-api
        if: steps.resolve.outputs.admin_api == 'true'
        run: |
          dotnet publish src/automation/admin-api/src/AdminApi.Functions/ \
            -c Release --no-build -o publish/admin-api

      - name: Package scheduler artifact
        if: steps.resolve.outputs.scheduler == 'true'
        run: cd publish/scheduler && zip -r ../../scheduler.zip .

      - name: Package orchestrator artifact
        if: steps.resolve.outputs.orchestrator == 'true'
        run: cd publish/orchestrator && zip -r ../../orchestrator.zip .

      - name: Package admin-api artifact
        if: steps.resolve.outputs.admin_api == 'true'
        run: cd publish/admin-api && zip -r ../../admin-api.zip .

      - name: Upload scheduler artifact
        if: steps.resolve.outputs.scheduler == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scheduler
          path: scheduler.zip

      - name: Upload orchestrator artifact
        if: steps.resolve.outputs.orchestrator == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator
          path: orchestrator.zip

      - name: Upload admin-api artifact
        if: steps.resolve.outputs.admin_api == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: admin-api
          path: admin-api.zip

  # ---------------------------------------------------------------
  # Deploy Function Apps
  # ---------------------------------------------------------------
  deploy-functions:
    runs-on: ubuntu-latest
    environment: dev
    needs: [build-and-test]
    if: >-
      always() && needs.build-and-test.result == 'success' &&
      (needs.build-and-test.outputs.deploy_scheduler == 'true' ||
       needs.build-and-test.outputs.deploy_orchestrator == 'true' ||
       needs.build-and-test.outputs.deploy_admin_api == 'true')
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Function App names from deployment outputs
        id: names
        run: |
          # Scheduler + Orchestrator names
          so_outputs=$(az deployment group show \
            --name scheduler-orchestrator \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs \
            --output json)
          echo "scheduler_app=$(echo "$so_outputs" | jq -r '.schedulerFunctionAppName.value')" >> "$GITHUB_OUTPUT"
          echo "orchestrator_app=$(echo "$so_outputs" | jq -r '.orchestratorFunctionAppName.value')" >> "$GITHUB_OUTPUT"

          # Admin API name
          api_outputs=$(az deployment group show \
            --name admin-api \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs \
            --output json)
          echo "admin_api_app=$(echo "$api_outputs" | jq -r '.functionAppName.value')" >> "$GITHUB_OUTPUT"

      - name: Download scheduler artifact
        if: needs.build-and-test.outputs.deploy_scheduler == 'true'
        uses: actions/download-artifact@v4
        with:
          name: scheduler

      - name: Download orchestrator artifact
        if: needs.build-and-test.outputs.deploy_orchestrator == 'true'
        uses: actions/download-artifact@v4
        with:
          name: orchestrator

      - name: Download admin-api artifact
        if: needs.build-and-test.outputs.deploy_admin_api == 'true'
        uses: actions/download-artifact@v4
        with:
          name: admin-api

      - name: Deploy scheduler
        if: needs.build-and-test.outputs.deploy_scheduler == 'true'
        run: |
          az functionapp deployment source config-zip \
            --resource-group "$RESOURCE_GROUP" \
            --name "${{ steps.names.outputs.scheduler_app }}" \
            --src scheduler.zip

      - name: Deploy orchestrator
        if: needs.build-and-test.outputs.deploy_orchestrator == 'true'
        run: |
          az functionapp deployment source config-zip \
            --resource-group "$RESOURCE_GROUP" \
            --name "${{ steps.names.outputs.orchestrator_app }}" \
            --src orchestrator.zip

      - name: Deploy admin-api
        if: needs.build-and-test.outputs.deploy_admin_api == 'true'
        run: |
          az functionapp deployment source config-zip \
            --resource-group "$RESOURCE_GROUP" \
            --name "${{ steps.names.outputs.admin_api_app }}" \
            --src admin-api.zip

  # ---------------------------------------------------------------
  # Deploy Cloud Worker container
  # ---------------------------------------------------------------
  deploy-cloud-worker:
    runs-on: ubuntu-latest
    environment: dev
    needs: [build-and-test]
    if: >-
      always() && needs.build-and-test.result == 'success' &&
      needs.build-and-test.outputs.deploy_cloud_worker == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch ACR login server
        id: acr
        run: |
          outputs=$(az deployment group show \
            --name shared-infra \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs \
            --output json)
          echo "login_server=$(echo "$outputs" | jq -r '.containerRegistryLoginServer.value')" >> "$GITHUB_OUTPUT"
          echo "acr_name=$(echo "$outputs" | jq -r '.containerRegistryName.value')" >> "$GITHUB_OUTPUT"

      - name: Build and push container image via ACR
        run: |
          IMAGE_TAG="${{ steps.acr.outputs.login_server }}/cloud-worker:${{ github.sha }}"
          az acr build \
            --registry "${{ steps.acr.outputs.acr_name }}" \
            --image "cloud-worker:${{ github.sha }}" \
            --image "cloud-worker:latest" \
            --file src/automation/cloud-worker/Dockerfile \
            src/automation/cloud-worker/

      - name: Fetch cloud-worker container app names
        id: apps
        run: |
          madev1_outputs=$(az deployment group show \
            --name cloud-worker-madev1 \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs \
            --output json)
          echo "madev1_app=$(echo "$madev1_outputs" | jq -r '.containerAppName.value')" >> "$GITHUB_OUTPUT"

          madev2_outputs=$(az deployment group show \
            --name cloud-worker-madev2 \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs \
            --output json)
          echo "madev2_app=$(echo "$madev2_outputs" | jq -r '.containerAppName.value')" >> "$GITHUB_OUTPUT"

      - name: Update madev1 container app
        run: |
          az containerapp update \
            --name "${{ steps.apps.outputs.madev1_app }}" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ steps.acr.outputs.login_server }}/cloud-worker:${{ github.sha }}"

      - name: Update madev2 container app
        run: |
          az containerapp update \
            --name "${{ steps.apps.outputs.madev2_app }}" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ steps.acr.outputs.login_server }}/cloud-worker:${{ github.sha }}"

  # ---------------------------------------------------------------
  # Deploy Hybrid Worker package to blob storage
  # ---------------------------------------------------------------
  deploy-hybrid-worker:
    runs-on: ubuntu-latest
    environment: dev
    needs: [build-and-test]
    if: >-
      always() && needs.build-and-test.result == 'success' &&
      needs.build-and-test.outputs.deploy_hybrid_worker == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Set version
        id: version
        run: |
          BASE_VERSION=$(cat src/automation/hybrid-worker/version.txt | tr -d '[:space:]')
          VERSION="${BASE_VERSION}.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Download .NET dependencies
        run: pwsh -File src/automation/hybrid-worker/Download-Dependencies.ps1

      - name: Package hybrid-worker
        run: |
          cd src/automation/hybrid-worker
          zip -r "hybrid-worker-${{ steps.version.outputs.version }}.zip" \
            src/ modules/ dotnet-libs/ version.txt Start-HybridWorker.ps1 \
            -x "tests/*" "config/*" "*.md"

      - name: Compute SHA256
        id: hash
        run: |
          HASH=$(sha256sum "src/automation/hybrid-worker/hybrid-worker-${{ steps.version.outputs.version }}.zip" | cut -d' ' -f1)
          echo "sha256=$HASH" >> "$GITHUB_OUTPUT"

      - name: Check hybrid-worker-shared infrastructure
        id: storage
        run: |
          if outputs=$(az deployment group show \
            --name hybrid-worker-shared \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs \
            --output json 2>/dev/null); then
            ACCOUNT=$(echo "$outputs" | jq -r '.updateStorageAccountName.value // empty')
            if [ -z "$ACCOUNT" ]; then
              # Deployment exists but outputs are empty (e.g. failed RoleAssignmentExists redeploy).
              # Fall back to querying the storage account by tag.
              ACCOUNT=$(az storage account list \
                --resource-group "$RESOURCE_GROUP" \
                --query "[?tags.component=='hybrid-worker'].name | [0]" \
                --output tsv 2>/dev/null)
            fi
            if [ -n "$ACCOUNT" ]; then
              echo "account=$ACCOUNT" >> "$GITHUB_OUTPUT"
              echo "exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::hybrid-worker-shared deployment found but storage account not resolved — skipping. Redeploy infra with: gh workflow run deploy-infra.yml -f stage=hybrid-worker"
              echo "exists=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::warning::hybrid-worker-shared infrastructure not deployed — skipping package upload. Deploy infra first via deploy-infra.yml."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload package artifact
        if: steps.storage.outputs.exists == 'true'
        id: artifact
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-worker-package
          path: src/automation/hybrid-worker/hybrid-worker-${{ steps.version.outputs.version }}.zip
          retention-days: 1

      - name: Fetch infrastructure outputs for upload
        if: steps.storage.outputs.exists == 'true'
        id: hw-infra
        run: |
          # Query resources directly — deployment outputs may be empty if the
          # hybrid-worker-shared deployment hit RoleAssignmentExists (ARM bug).
          IDENTITY_NAME="id-hw-upload-$(jq -r '.parameters.baseName.value' infra/automation/hybrid-worker-shared/deploy.parameters.json)"
          identity_json=$(az identity show \
            --name "$IDENTITY_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --output json 2>/dev/null || true)
          if [ -z "$identity_json" ] || [ "$identity_json" = "null" ]; then
            echo "::error::Upload managed identity '$IDENTITY_NAME' not found. Deploy infra first: gh workflow run deploy-infra.yml -f stage=hybrid-worker"
            exit 1
          fi
          echo "managed_identity_id=$(echo "$identity_json" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "managed_identity_client_id=$(echo "$identity_json" | jq -r '.clientId')" >> "$GITHUB_OUTPUT"

          SCRIPT_ACCOUNT=$(az storage account list \
            --resource-group "$RESOURCE_GROUP" \
            --query "[?starts_with(name, 'sthwds')].name | [0]" \
            --output tsv 2>/dev/null)
          if [ -z "$SCRIPT_ACCOUNT" ]; then
            echo "::error::Deployment script storage account not found. Deploy infra first: gh workflow run deploy-infra.yml -f stage=hybrid-worker"
            exit 1
          fi
          echo "script_storage_account=$SCRIPT_ACCOUNT" >> "$GITHUB_OUTPUT"

          # Shared infra outputs (for deployment scripts subnet)
          shared_outputs=$(az deployment group show \
            --name shared-infra \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs \
            --output json)
          echo "ds_subnet_id=$(echo "$shared_outputs" | jq -r '.deploymentScriptsSubnetId.value')" >> "$GITHUB_OUTPUT"

      - name: Upload package via ARM deployment script
        if: steps.storage.outputs.exists == 'true'
        run: |
          ARTIFACT_URL="https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${{ steps.artifact.outputs.artifact-id }}/zip"

          az deployment group create \
            --name "hw-upload-$(date -u +%Y%m%d%H%M%S)" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/automation/hybrid-worker-shared/upload.bicep \
            --parameters \
              updateStorageAccountName="${{ steps.storage.outputs.account }}" \
              scriptStorageAccountName="${{ steps.hw-infra.outputs.script_storage_account }}" \
              managedIdentityId="${{ steps.hw-infra.outputs.managed_identity_id }}" \
              managedIdentityClientId="${{ steps.hw-infra.outputs.managed_identity_client_id }}" \
              subnetId="${{ steps.hw-infra.outputs.ds_subnet_id }}" \
              packageVersion="${{ steps.version.outputs.version }}" \
              packageSha256="${{ steps.hash.outputs.sha256 }}" \
              artifactUrl="$ARTIFACT_URL" \
              githubToken="${{ github.token }}"

  # ---------------------------------------------------------------
  # Deploy Analytics containers
  # ---------------------------------------------------------------
  deploy-analytics:
    runs-on: ubuntu-latest
    environment: dev
    needs: [build-and-test]
    if: >-
      always() && needs.build-and-test.result == 'success' &&
      needs.build-and-test.outputs.deploy_analytics == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch ACR login server
        id: acr
        run: |
          outputs=$(az deployment group show \
            --name shared-infra \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs \
            --output json)
          echo "login_server=$(echo "$outputs" | jq -r '.containerRegistryLoginServer.value')" >> "$GITHUB_OUTPUT"
          echo "acr_name=$(echo "$outputs" | jq -r '.containerRegistryName.value')" >> "$GITHUB_OUTPUT"

      - name: Build and push graph-ingest
        run: |
          az acr build \
            --registry "${{ steps.acr.outputs.acr_name }}" \
            --image "analytics/graph-ingest:${{ github.sha }}" \
            --image "analytics/graph-ingest:latest" \
            --file src/analytics/containers/graph-ingest/Dockerfile \
            src/analytics/

      - name: Build and push exo-ingest
        run: |
          az acr build \
            --registry "${{ steps.acr.outputs.acr_name }}" \
            --image "analytics/exo-ingest:${{ github.sha }}" \
            --image "analytics/exo-ingest:latest" \
            --file src/analytics/containers/exo-ingest/Dockerfile \
            src/analytics/

      - name: Build and push spo-ingest
        run: |
          az acr build \
            --registry "${{ steps.acr.outputs.acr_name }}" \
            --image "analytics/spo-ingest:${{ github.sha }}" \
            --image "analytics/spo-ingest:latest" \
            --file src/analytics/containers/spo-ingest/Dockerfile \
            src/analytics/

      - name: Check analytics infrastructure exists
        id: analytics-infra
        run: |
          if az deployment group show \
            --name analytics \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.provisioningState \
            --output tsv 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Analytics infrastructure not deployed — skipping job image update. Deploy infra first: gh workflow run deploy-infra.yml -f stage=analytics"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch analytics deployment outputs
        if: steps.analytics-infra.outputs.exists == 'true'
        id: jobs
        run: |
          outputs=$(az deployment group show \
            --name analytics \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs \
            --output json)
          # jobNames is an array output — extract each
          echo "job_names=$(echo "$outputs" | jq -r '.jobNames.value | join(",")')" >> "$GITHUB_OUTPUT"
          echo "workspace_url=https://$(echo "$outputs" | jq -r '.databricksWorkspaceUrl.value')" >> "$GITHUB_OUTPUT"
          echo "storage_account=$(echo "$outputs" | jq -r '.storageAccountName.value')" >> "$GITHUB_OUTPUT"

      - name: Update ACA Job images
        if: steps.analytics-infra.outputs.exists == 'true'
        run: |
          IFS=',' read -ra JOBS <<< "${{ steps.jobs.outputs.job_names }}"
          IMAGES=("analytics/graph-ingest" "analytics/exo-ingest" "analytics/spo-ingest")
          for i in "${!JOBS[@]}"; do
            echo "Updating ${JOBS[$i]} -> ${IMAGES[$i]}:${{ github.sha }}"
            az containerapp job update \
              --name "${JOBS[$i]}" \
              --resource-group "$RESOURCE_GROUP" \
              --image "${{ steps.acr.outputs.login_server }}/${IMAGES[$i]}:${{ github.sha }}"
          done

      # --- Databricks: upload DLT notebooks and create/update pipeline ---

      - name: Get Databricks API tokens
        if: steps.analytics-infra.outputs.exists == 'true'
        id: dbx-token
        run: |
          TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

          # ARM management token — required by Unity Catalog storage credential API
          # when called by a service principal
          ARM_TOKEN=$(az account get-access-token \
            --resource https://management.azure.com/ \
            --query accessToken -o tsv)
          echo "::add-mask::$ARM_TOKEN"
          echo "arm_token=$ARM_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Ensure Unity Catalog schemas exist
        if: steps.analytics-infra.outputs.exists == 'true'
        run: |
          WORKSPACE_URL="${{ steps.jobs.outputs.workspace_url }}"
          TOKEN="${{ steps.dbx-token.outputs.token }}"

          # Find or create a SQL warehouse
          WAREHOUSE_ID=$(curl -sSf "${WORKSPACE_URL}/api/2.0/sql/warehouses" \
            -H "Authorization: Bearer ${TOKEN}" | jq -r '.warehouses[0].id // empty')

          if [ -z "$WAREHOUSE_ID" ]; then
            echo "No SQL warehouse found — creating one"
            WAREHOUSE_ID=$(curl -sSf -X POST "${WORKSPACE_URL}/api/2.0/sql/warehouses" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{
                "name": "matoolkit-analytics",
                "cluster_size": "2X-Small",
                "auto_stop_mins": 10,
                "warehouse_type": "PRO",
                "enable_serverless_compute": true
              }' | jq -r '.id')
            echo "Created warehouse: ${WAREHOUSE_ID}"
          else
            echo "Using existing warehouse: ${WAREHOUSE_ID}"
            # Start it if stopped
            curl -sS -X POST "${WORKSPACE_URL}/api/2.0/sql/warehouses/${WAREHOUSE_ID}/start" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" || true
          fi

          # Wait for warehouse to be RUNNING (up to 5 minutes)
          for i in $(seq 1 30); do
            STATE=$(curl -sSf "${WORKSPACE_URL}/api/2.0/sql/warehouses/${WAREHOUSE_ID}" \
              -H "Authorization: Bearer ${TOKEN}" | jq -r '.state')
            echo "Warehouse state: ${STATE}"
            if [ "$STATE" = "RUNNING" ]; then break; fi
            if [ "$i" = "30" ]; then echo "::error::Warehouse failed to start"; exit 1; fi
            sleep 10
          done

          # Run Unity Catalog setup (idempotent)
          STORAGE_ACCOUNT="${{ steps.jobs.outputs.storage_account }}"
          CATALOG_LOCATION="abfss://unity-catalog@${STORAGE_ACCOUNT}.dfs.core.windows.net/"

          # Create storage credential via REST API (idempotent)
          ACCESS_CONNECTOR_ID=$(az resource show \
            --name matoolkit-analytics-dbac-dev \
            --resource-group "$RESOURCE_GROUP" \
            --resource-type "Microsoft.Databricks/accessConnectors" \
            --query id -o tsv)
          echo "Access connector: ${ACCESS_CONNECTOR_ID}"

          CRED_NAME="matoolkit-analytics-access-connector"
          CRED_CHECK=$(curl -sS -o /dev/null -w "%{http_code}" \
            "${WORKSPACE_URL}/api/2.1/unity-catalog/storage-credentials/${CRED_NAME}" \
            -H "Authorization: Bearer ${TOKEN}")
          if [ "$CRED_CHECK" = "200" ]; then
            echo "Storage credential '${CRED_NAME}' already exists"
          else
            echo "Creating storage credential '${CRED_NAME}'"
            ARM_TOKEN="${{ steps.dbx-token.outputs.arm_token }}"
            CRED_RESULT=$(curl -sS -w "\n%{http_code}" -X POST \
              "${WORKSPACE_URL}/api/2.1/unity-catalog/storage-credentials" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "X-Databricks-Azure-SP-Management-Token: ${ARM_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\": \"${CRED_NAME}\",
                \"azure_managed_identity\": {
                  \"access_connector_id\": \"${ACCESS_CONNECTOR_ID}\"
                }
              }")
            CRED_HTTP=$(echo "$CRED_RESULT" | tail -1)
            CRED_BODY=$(echo "$CRED_RESULT" | sed '$d')
            echo "Storage credential response (${CRED_HTTP}): ${CRED_BODY}"
            if [ "$CRED_HTTP" -ge 400 ]; then exit 1; fi
          fi

          # Create external location via REST API (idempotent)
          EXTLOC_NAME="matoolkit-analytics-unity-catalog"
          EXTLOC_CHECK=$(curl -sS -o /dev/null -w "%{http_code}" \
            "${WORKSPACE_URL}/api/2.1/unity-catalog/external-locations/${EXTLOC_NAME}" \
            -H "Authorization: Bearer ${TOKEN}")
          if [ "$EXTLOC_CHECK" = "200" ]; then
            echo "External location '${EXTLOC_NAME}' already exists"
          else
            echo "Creating external location '${EXTLOC_NAME}'"
            EXTLOC_RESULT=$(curl -sS -w "\n%{http_code}" -X POST \
              "${WORKSPACE_URL}/api/2.1/unity-catalog/external-locations" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\": \"${EXTLOC_NAME}\",
                \"url\": \"${CATALOG_LOCATION}\",
                \"credential_name\": \"${CRED_NAME}\"
              }")
            EXTLOC_HTTP=$(echo "$EXTLOC_RESULT" | tail -1)
            EXTLOC_BODY=$(echo "$EXTLOC_RESULT" | sed '$d')
            echo "External location response (${EXTLOC_HTTP}): ${EXTLOC_BODY}"
            if [ "$EXTLOC_HTTP" -ge 400 ]; then exit 1; fi
          fi

          # Create catalog and schemas via SQL (idempotent)
          STATEMENTS=(
            "CREATE CATALOG IF NOT EXISTS matoolkit_analytics MANAGED LOCATION '${CATALOG_LOCATION}' COMMENT 'M&A Toolkit analytics data'"
            "CREATE SCHEMA IF NOT EXISTS matoolkit_analytics.bronze COMMENT 'Raw data from Microsoft tenant APIs'"
            "CREATE SCHEMA IF NOT EXISTS matoolkit_analytics.silver COMMENT 'Cleaned and deduplicated data - SCD Type 1'"
            "GRANT USE_CATALOG, USE_SCHEMA, SELECT, CREATE_SCHEMA, CREATE_TABLE ON CATALOG matoolkit_analytics TO \`account users\`"
          )

          for stmt in "${STATEMENTS[@]}"; do
            echo "Executing: ${stmt}"
            RESULT=$(curl -sS -X POST "${WORKSPACE_URL}/api/2.0/sql/statements" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"warehouse_id\": \"${WAREHOUSE_ID}\",
                \"statement\": \"${stmt}\",
                \"wait_timeout\": \"30s\"
              }")
            STATE=$(echo "$RESULT" | jq -r '.status.state')
            if [ "$STATE" = "FAILED" ]; then
              ERROR=$(echo "$RESULT" | jq -r '.status.error.message')
              echo "::error::SQL failed: ${ERROR}"
              exit 1
            fi
            echo "SQL state: ${STATE}"
          done
          echo "Unity Catalog setup complete"

      - name: Upload DLT notebooks to Databricks workspace
        if: steps.analytics-infra.outputs.exists == 'true'
        run: |
          WORKSPACE_URL="${{ steps.jobs.outputs.workspace_url }}"
          TOKEN="${{ steps.dbx-token.outputs.token }}"

          # Ensure parent directory exists
          curl -sSf -X POST "${WORKSPACE_URL}/api/2.0/workspace/mkdirs" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"path": "/Shared/analytics/dlt"}'

          for notebook in bronze silver; do
            echo "Uploading ${notebook}.py -> /Shared/analytics/dlt/${notebook}"
            CONTENT=$(base64 -w 0 "src/analytics/databricks/dlt/${notebook}.py")
            curl -sSf -X POST "${WORKSPACE_URL}/api/2.0/workspace/import" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"path\": \"/Shared/analytics/dlt/${notebook}\",
                \"language\": \"PYTHON\",
                \"overwrite\": true,
                \"format\": \"SOURCE\",
                \"content\": \"${CONTENT}\"
              }"
          done

      - name: Create or update DLT pipeline
        if: steps.analytics-infra.outputs.exists == 'true'
        id: create-dlt
        run: |
          WORKSPACE_URL="${{ steps.jobs.outputs.workspace_url }}"
          TOKEN="${{ steps.dbx-token.outputs.token }}"
          STORAGE_ACCOUNT="${{ steps.jobs.outputs.storage_account }}"
          PIPELINE_NAME="matoolkit-analytics-dlt"

          # Check if pipeline already exists
          LIST_RESPONSE=$(curl -sS "${WORKSPACE_URL}/api/2.0/pipelines?filter=name%20LIKE%20'${PIPELINE_NAME}'" \
            -H "Authorization: Bearer ${TOKEN}")
          echo "List response: ${LIST_RESPONSE}"
          EXISTING=$(echo "$LIST_RESPONSE" | jq -r '.statuses[0].pipeline_id // empty')

          PIPELINE_SPEC=$(cat <<SPEC
          {
            "name": "${PIPELINE_NAME}",
            "catalog": "matoolkit_analytics",
            "target": "bronze",
            "libraries": [
              {"notebook": {"path": "/Shared/analytics/dlt/bronze"}}
            ],
            "configuration": {
              "analytics.storage_account_name": "${STORAGE_ACCOUNT}"
            },
            "development": true,
            "channel": "CURRENT",
            "run_as": {"service_principal_name": "${{ secrets.AZURE_CLIENT_ID }}"}
          }
          SPEC
          )
          echo "Pipeline spec: ${PIPELINE_SPEC}"

          if [ -n "$EXISTING" ]; then
            echo "Updating existing pipeline: ${EXISTING}"
            RESPONSE=$(curl -sS -w "\n%{http_code}" -X PUT "${WORKSPACE_URL}/api/2.0/pipelines/${EXISTING}" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$PIPELINE_SPEC")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "Response (${HTTP_CODE}): ${BODY}"
            if [ "$HTTP_CODE" -ge 400 ]; then exit 1; fi
            echo "pipeline_id=${EXISTING}" >> "$GITHUB_OUTPUT"
          else
            echo "Creating new pipeline: ${PIPELINE_NAME}"
            RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${WORKSPACE_URL}/api/2.0/pipelines" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$PIPELINE_SPEC")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "Response (${HTTP_CODE}): ${BODY}"
            if [ "$HTTP_CODE" -ge 400 ]; then exit 1; fi
            PIPELINE_ID=$(echo "$BODY" | jq -r '.pipeline_id')
            echo "Created pipeline: ${PIPELINE_ID}"
            echo "pipeline_id=${PIPELINE_ID}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update silver DLT pipeline
        if: steps.analytics-infra.outputs.exists == 'true'
        id: create-dlt-silver
        run: |
          WORKSPACE_URL="${{ steps.jobs.outputs.workspace_url }}"
          TOKEN="${{ steps.dbx-token.outputs.token }}"
          STORAGE_ACCOUNT="${{ steps.jobs.outputs.storage_account }}"
          PIPELINE_NAME="matoolkit-analytics-dlt-silver"

          # Check if pipeline already exists
          LIST_RESPONSE=$(curl -sS "${WORKSPACE_URL}/api/2.0/pipelines?filter=name%20LIKE%20'${PIPELINE_NAME}'" \
            -H "Authorization: Bearer ${TOKEN}")
          echo "List response: ${LIST_RESPONSE}"
          EXISTING=$(echo "$LIST_RESPONSE" | jq -r '.statuses[0].pipeline_id // empty')

          PIPELINE_SPEC=$(cat <<SPEC
          {
            "name": "${PIPELINE_NAME}",
            "catalog": "matoolkit_analytics",
            "target": "silver",
            "libraries": [
              {"notebook": {"path": "/Shared/analytics/dlt/silver"}}
            ],
            "configuration": {
              "analytics.storage_account_name": "${STORAGE_ACCOUNT}"
            },
            "development": true,
            "channel": "CURRENT",
            "run_as": {"service_principal_name": "${{ secrets.AZURE_CLIENT_ID }}"}
          }
          SPEC
          )
          echo "Pipeline spec: ${PIPELINE_SPEC}"

          if [ -n "$EXISTING" ]; then
            echo "Updating existing pipeline: ${EXISTING}"
            RESPONSE=$(curl -sS -w "\n%{http_code}" -X PUT "${WORKSPACE_URL}/api/2.0/pipelines/${EXISTING}" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$PIPELINE_SPEC")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "Response (${HTTP_CODE}): ${BODY}"
            if [ "$HTTP_CODE" -ge 400 ]; then exit 1; fi
            echo "pipeline_id=${EXISTING}" >> "$GITHUB_OUTPUT"
          else
            echo "Creating new pipeline: ${PIPELINE_NAME}"
            RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${WORKSPACE_URL}/api/2.0/pipelines" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$PIPELINE_SPEC")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "Response (${HTTP_CODE}): ${BODY}"
            if [ "$HTTP_CODE" -ge 400 ]; then exit 1; fi
            PIPELINE_ID=$(echo "$BODY" | jq -r '.pipeline_id')
            echo "Created pipeline: ${PIPELINE_ID}"
            echo "pipeline_id=${PIPELINE_ID}" >> "$GITHUB_OUTPUT"
          fi

      # --- Register ADF managed identity in Databricks and grant DLT access ---
      # The CI/CD SP lacks Graph API permissions to dynamically look up ADF's
      # appId from its principalId. ADF_MANAGED_IDENTITY_APP_ID is stored as a
      # GitHub variable (stable across Bicep redeployments; only changes if the
      # Data Factory is deleted and recreated).

      - name: Register ADF service principal in Databricks
        if: steps.analytics-infra.outputs.exists == 'true'
        run: |
          WORKSPACE_URL="${{ steps.jobs.outputs.workspace_url }}"
          TOKEN="${{ steps.dbx-token.outputs.token }}"
          ADF_APP_ID="${{ vars.ADF_MANAGED_IDENTITY_APP_ID }}"

          if [ -z "$ADF_APP_ID" ]; then
            echo "::error::ADF_MANAGED_IDENTITY_APP_ID variable not set. Run: az ad sp show --id \$(az resource show --resource-type Microsoft.DataFactory/factories --name matoolkit-analytics-adf-dev --resource-group \$RG --query identity.principalId -o tsv) --query appId -o tsv"
            exit 1
          fi

          # Check if already registered
          EXISTING=$(curl -sS "${WORKSPACE_URL}/api/2.0/preview/scim/v2/ServicePrincipals?filter=applicationId+eq+${ADF_APP_ID}" \
            -H "Authorization: Bearer ${TOKEN}" | jq -r '.Resources[0].id // empty')

          if [ -z "$EXISTING" ]; then
            echo "Registering ADF SP (appId: ${ADF_APP_ID})"
            RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
              "${WORKSPACE_URL}/api/2.0/preview/scim/v2/ServicePrincipals" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"applicationId\": \"${ADF_APP_ID}\", \"displayName\": \"matoolkit-analytics-adf-dev\", \"entitlements\": [{\"value\": \"workspace-access\"}]}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "Response (${HTTP_CODE}): ${BODY}"
            if [ "$HTTP_CODE" -ge 400 ]; then
              echo "::error::Failed to register ADF service principal"
              exit 1
            fi
          else
            echo "ADF SP already registered (databricks id: ${EXISTING})"
          fi

      - name: Grant DLT pipeline permissions to ADF
        if: steps.analytics-infra.outputs.exists == 'true'
        run: |
          WORKSPACE_URL="${{ steps.jobs.outputs.workspace_url }}"
          TOKEN="${{ steps.dbx-token.outputs.token }}"
          ADF_APP_ID="${{ vars.ADF_MANAGED_IDENTITY_APP_ID }}"

          for PIPELINE_ID in "${{ steps.create-dlt.outputs.pipeline_id }}" "${{ steps.create-dlt-silver.outputs.pipeline_id }}"; do
            echo "Granting CAN_MANAGE on pipeline ${PIPELINE_ID} to ADF (${ADF_APP_ID})"
            RESPONSE=$(curl -sS -w "\n%{http_code}" -X PATCH \
              "${WORKSPACE_URL}/api/2.0/permissions/pipelines/${PIPELINE_ID}" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"access_control_list\": [{\"service_principal_name\": \"${ADF_APP_ID}\", \"permission_level\": \"CAN_MANAGE\"}]}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "Response (${HTTP_CODE}): ${BODY}"
            if [ "$HTTP_CODE" -ge 400 ]; then
              echo "::error::Failed to set permissions on pipeline ${PIPELINE_ID}"
              exit 1
            fi
          done

      # --- ADF: deploy pipelines and triggers ---

      - name: Install Data Factory CLI extension
        if: steps.analytics-infra.outputs.exists == 'true'
        run: az extension add --name datafactory --yes

      - name: Fetch ADF deployment parameters
        if: steps.analytics-infra.outputs.exists == 'true'
        id: adf-params
        run: |
          # Key Vault name from shared infra
          shared_outputs=$(az deployment group show \
            --name shared-infra \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs \
            --output json)
          echo "kv_name=$(echo "$shared_outputs" | jq -r '.keyVaultName.value')" >> "$GITHUB_OUTPUT"

          # Data Factory name from analytics infra
          analytics_outputs=$(az deployment group show \
            --name analytics \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs \
            --output json)
          echo "adf_name=$(echo "$analytics_outputs" | jq -r '.dataFactoryName.value')" >> "$GITHUB_OUTPUT"

      - name: Deploy ADF pipelines
        if: steps.analytics-infra.outputs.exists == 'true'
        run: |
          ADF_NAME="${{ steps.adf-params.outputs.adf_name }}"

          # Build parameter defaults from deployment outputs
          KV_NAME="${{ steps.adf-params.outputs.kv_name }}"
          STORAGE="${{ steps.jobs.outputs.storage_account }}"
          WORKSPACE_URL="${{ steps.jobs.outputs.workspace_url }}"
          DLT_PIPELINE_ID="${{ steps.create-dlt.outputs.pipeline_id }}"
          DLT_SILVER_PIPELINE_ID="${{ steps.create-dlt-silver.outputs.pipeline_id }}"

          IFS=',' read -ra JOBS <<< "${{ steps.jobs.outputs.job_names }}"
          GRAPH_JOB="${JOBS[0]}"
          EXO_JOB="${JOBS[1]}"
          SPO_JOB="${JOBS[2]}"

          DEFAULTS=$(jq -n \
            --arg kv "$KV_NAME" \
            --arg storage "$STORAGE" \
            --arg graph "$GRAPH_JOB" \
            --arg exo "$EXO_JOB" \
            --arg spo "$SPO_JOB" \
            --arg rg "$RESOURCE_GROUP" \
            --arg sub "$AZURE_SUBSCRIPTION_ID" \
            --arg dlt "$DLT_PIPELINE_ID" \
            --arg dltsilver "$DLT_SILVER_PIPELINE_ID" \
            --arg dbx "$WORKSPACE_URL" \
            '{
              keyVaultName: $kv,
              storageAccountName: $storage,
              graphJobName: $graph,
              exoJobName: $exo,
              spoJobName: $spo,
              resourceGroupName: $rg,
              subscriptionId: $sub,
              dltPipelineId: $dlt,
              dltSilverPipelineId: $dltsilver,
              databricksWorkspaceUrl: $dbx
            }')

          # Deploy in dependency order (helpers first, then orchestrators)
          PIPELINE_ORDER=(
            pl_run_container_job
            pl_run_dlt
            pl_run_dlt_all
            pl_orchestrate_core
            pl_orchestrate_core_enrichment
            pl_orchestrate_enrichment
            pl_orchestrate_ondemand
          )

          for pipeline in "${PIPELINE_ORDER[@]}"; do
            echo "Deploying pipeline: ${pipeline}"
            FILE="src/analytics/datafactory/pipelines/${pipeline}.json"

            # Inject defaultValue into parameters that exist in this pipeline
            PROPS=$(jq --argjson defaults "$DEFAULTS" '
              .properties | .parameters = (
                .parameters | to_entries | map(
                  if $defaults[.key] then
                    .value.defaultValue = $defaults[.key]
                  else . end
                ) | from_entries
              )
            ' "$FILE")

            az datafactory pipeline create \
              --factory-name "$ADF_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --name "$pipeline" \
              --pipeline "$PROPS" \
              --output none
            echo "  Deployed: ${pipeline}"
          done

      - name: Deploy ADF triggers
        if: steps.analytics-infra.outputs.exists == 'true'
        run: |
          ADF_NAME="${{ steps.adf-params.outputs.adf_name }}"

          for trigger_file in src/analytics/datafactory/triggers/tr_*.json; do
            TRIGGER_NAME=$(jq -r '.name' "$trigger_file")
            echo "Deploying trigger: ${TRIGGER_NAME}"

            PROPS=$(jq '.properties' "$trigger_file")

            az datafactory trigger create \
              --factory-name "$ADF_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --name "$TRIGGER_NAME" \
              --properties "$PROPS" \
              --output none
            echo "  Deployed: ${TRIGGER_NAME} (stopped)"
          done
          echo "Triggers deployed in stopped state. Start them manually or via workflow when ready."

  # ---------------------------------------------------------------
  # Deploy tenant registry to Key Vault
  # ---------------------------------------------------------------
  deploy-tenant-registry:
    runs-on: ubuntu-latest
    environment: dev
    needs: [build-and-test]
    if: >-
      always() && needs.build-and-test.result == 'success' &&
      needs.build-and-test.outputs.deploy_tenant_registry == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Key Vault name
        id: kv
        run: |
          outputs=$(az deployment group show \
            --name shared-infra \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.outputs \
            --output json)
          echo "name=$(echo "$outputs" | jq -r '.keyVaultName.value')" >> "$GITHUB_OUTPUT"

      - name: Upload tenant registry to Key Vault
        run: |
          KV_NAME="${{ steps.kv.outputs.name }}"

          # Temporarily open the firewall (runner is not on the VNet)
          az keyvault update --name "$KV_NAME" \
            --public-network-access Enabled \
            --default-action Allow \
            --output none

          # Wait for firewall change to propagate
          sleep 15

          az keyvault secret set \
            --vault-name "$KV_NAME" \
            --name tenant-registry \
            --file config/tenant-registry.json \
            --content-type application/json \
            --output none

          # Re-lock the firewall
          az keyvault update --name "$KV_NAME" \
            --default-action Deny \
            --public-network-access Disabled \
            --output none
